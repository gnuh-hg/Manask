<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" href="./img/logo_web_v2.png" type="image/png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap">

        <link rel="stylesheet" href="./css/home.css" />
        <script type="module" src="./js/home.js" defer></script>

        <link rel="stylesheet" href="./css/home/sidebar_nav.css" />
        <script type="module" src="./js/home/sidebar_nav.js" defer></script>

        <link rel="stylesheet" href="./css/home/container_task.css" />
        <script type="module" src="./js/home/container_task.js" defer></script>

        <link rel="stylesheet" href="./css/hint_float.css" />
        <script type="module" src="./js/intent_prompt.js" defer></script>

        <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

        <style>
            /* ── Cycle button (field / operator) ──────────────────────────── */
            .sf-cycle-btn {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                padding: 8px 10px;
                border: 1px solid var(--border-color);
                border-radius: 7px;
                background: var(--bg-hover);
                color: var(--text-primary);
                font-size: 13px;
                font-weight: 400;
                font-family: inherit;
                cursor: pointer;
                transition: border-color .15s, background .15s, color .15s;
                white-space: nowrap;
                user-select: none;
                width: 100%;
            }
            .sf-cycle-btn::after {
                content: '↻';
                font-size: 11px;
                opacity: .45;
                transition: opacity .15s;
            }
            .sf-cycle-btn:hover {
                border-color: var(--accent-primary);
                color: var(--accent-primary);
                background: var(--accent-subtle);
            }
            .sf-cycle-btn:hover::after {
                opacity: .9;
            }

            /* ── Filter Date Picker button ─────────────────────────────── */
            .sf-date-btn-wrap {
                display: inline-flex;
            }
            .sf-date-btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 5px 10px;
                border: 1.5px dashed var(--border-color);
                border-radius: 6px;
                background: transparent;
                color: var(--text-secondary);
                font-size: 12px;
                cursor: pointer;
                transition: border-color .15s, color .15s, background .15s;
                white-space: nowrap;
            }
            .sf-date-btn:hover {
                border-color: var(--accent-primary);
                color: var(--accent-primary);
                background: var(--accent-subtle);
            }
            .sf-date-btn.has-date {
                border-style: solid;
                border-color: var(--accent-primary);
                color: var(--text-primary);
                background: var(--accent-subtle);
            }
            .sf-date-btn svg {
                flex-shrink: 0;
                opacity: .7;
            }
            .sf-date-btn .placeholder {
                opacity: .6;
            }
        </style>
    </head>
    <body>
        <div class="app-content">

            <!-- Backdrop for mobile folder card -->
            <div class="folder-card-overlay" id="folderCardOverlay"></div>

            <!-- Mobile-only FAB to open folder tree -->
            <button class="folder-fab" id="btn-folders" aria-label="Folders" data-i18n-aria="sidebar.folders_btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
            </button>

            <!-- Backdrop for task detail card -->
            <div class="task-detail-overlay" id="taskDetailOverlay"></div>

            <div class="container">

            <!-- ── Task List ── -->
            <div class="container-task">
                <h1>
                    <svg class="task-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
                        <line x1="8" y1="8" x2="16" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="8" y1="16" x2="13" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <p data-i18n="home.task_manager_title">Task Manager</p>
                    <div class="h1-actions">
                        <button class="btn-toolbar" id="btn-sort">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                                <line x1="1" y1="3" x2="13" y2="3" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                                <line x1="3" y1="7" x2="11" y2="7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                                <line x1="5" y1="11" x2="9" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                            <span data-i18n="home.btn_sort">Sort</span>
                            <span class="badge-count" id="sort-badge" style="display:none">0</span>
                        </button>
                        <button class="btn-toolbar" id="btn-filter">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                                <path d="M1.5 2.5h11l-4.5 5v4l-2-1V7.5L1.5 2.5z" stroke="white" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
                            </svg>
                            <span data-i18n="home.btn_filter">Filter</span>
                            <span class="badge-count" id="filter-badge" style="display:none">0</span>
                        </button>
                        <button class="btn-done" data-i18n="home.task_new">New task</button>
                    </div>
                </h1>
                <div class="task-list"></div>
            </div>

            <!-- ── Task Detail: centered floating card (position: fixed, toggled by JS) ── -->
            <div class="task-detail-panel">
                <!-- Header -->
                <div class="task-detail-header">
                    <h3 class="task-detail-title" data-i18n="home.task_detail_title">Task Details</h3>
                    <button class="btn-close-detail">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <!-- Content -->
                <div class="task-detail-content">

                    <!-- Task Name -->
                    <div class="detail-task-name-section">
                        <input type="text" class="detail-task-name"
                               data-i18n-placeholder="home.task_name_placeholder"
                               placeholder="Task name">
                    </div>

                    <!-- Progress (featured card) -->
                    <div class="tdp-progress-section">
                        <div class="tdp-progress-header">
                            <span class="tdp-section-label">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                                </svg>
                                <span data-i18n="home.task_progress">Progress</span>
                            </span>
                            <span class="tdp-progress-value" id="processValue">0%</span>
                        </div>
                        <input type="range" id="processSlider" class="process-slider"
                               min="0" max="100" value="0" step="1">
                    </div>

                    <!-- Properties Card -->
                    <div class="tdp-properties">
                        <!-- Priority -->
                        <div class="detail-section">
                            <div class="detail-label">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                                </svg>
                                <span data-i18n="home.task_priority">Priority</span>
                            </div>
                            <div class="detail-value">
                                <div class="priority-badge high">
                                    <svg viewBox="0 0 24 24" fill="currentColor">
                                        <circle cx="12" cy="12" r="10"/>
                                    </svg>
                                    <span data-i18n="home.priority_high">High</span>
                                </div>
                            </div>
                        </div>

                        <!-- Start Date -->
                        <div class="detail-section">
                            <div class="detail-label">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                <span data-i18n="home.task_start_date">Start date</span>
                            </div>
                            <div class="detail-value">
                                <button class="date-picker-btn" id="startDateBtn">
                                    <span class="date-btn-text placeholder" id="startDateText"
                                          data-i18n="home.date_set">Set date</span>
                                </button>
                            </div>
                        </div>

                        <!-- Due Date -->
                        <div class="detail-section">
                            <div class="detail-label">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                <span data-i18n="home.task_due_date">Due date</span>
                            </div>
                            <div class="detail-value">
                                <button class="date-picker-btn" id="dueDateBtn">
                                    <span class="date-btn-text placeholder" id="dueDateText"
                                          data-i18n="home.date_set">Set date</span>
                                </button>
                            </div>
                        </div>

                        <!-- Time Spent -->
                        <div class="detail-section">
                            <div class="detail-label">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                                <span data-i18n="home.task_time_spent">Time spent</span>
                            </div>
                            <div class="detail-value">
                                <div class="time-spent-display">
                                    <span class="time-value">0h 0m</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Notes -->
                    <div class="tdp-notes-section">
                        <div class="tdp-section-label">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                            </svg>
                            <span data-i18n="home.task_notes">Notes</span>
                        </div>
                        <textarea class="notes-textarea"
                                  data-i18n-placeholder="home.task_notes_placeholder"
                                  placeholder="Add notes..."></textarea>
                    </div>

                </div>

                <!-- Footer -->
                <div class="task-detail-footer">
                    <button class="btn-delete-task">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                        <span data-i18n="home.task_delete">Delete task</span>
                    </button>
                </div>
            </div>

            <!-- ── Folder Tree Panel: right side on desktop, floating on mobile ── -->
            <div class="sidebar-nav folder-floating-card" id="folderFloatingCard">
                <!-- Mobile-only close button (top-right of card) -->
                <button class="folder-card-close" id="folderCardCloseBtn" aria-label="Đóng" data-i18n-aria="home.sidebar_close_label">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6"  x2="6"  y2="18"/>
                        <line x1="6"  y1="6"  x2="18" y2="18"/>
                    </svg>
                </button>
                <div class="folder-container"><ul class="list-wrapper"></ul></div>
                <div class="sidebar-actions">
                    <button class="add-button">
                        <div class="icon-plus">
                            <svg viewBox="0 0 100 100">
                                <rect x="44" y="10" width="12" height="80" />
                                <rect x="10" y="44" width="80" height="12" />
                            </svg>
                        </div>
                        <p data-i18n="home.sidebar_create_new">Create new</p>
                        <div class="icon-folder-plus">
                            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                  <mask id="folder-mask">
                                    <rect width="100%" height="100%" fill="white"/>
                                    <circle cx="46" cy="47" r="9" fill="black"/>
                                  </mask>
                                </defs>
                                <path d="M8 20 H22 L26 16 H44 Q50 16 50 22 V40 Q50 48 42 48 H16 Q8 48 8 40 Z"/>
                                <g stroke-width="4" stroke-linecap="round">
                                  <line x1="46" y1="42" x2="46" y2="52"/>
                                  <line x1="41" y1="47" x2="51" y2="47"/>
                                </g>
                            </svg>
                        </div>
                    </button>

                    <!-- Close button — visible on mobile only -->
                    <button class="sidebar-close-btn" id="sidebarCloseBtn"
                            data-i18n-aria="home.sidebar_close_label"
                            aria-label="Close sidebar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6"  x2="6"  y2="18"/>
                            <line x1="6"  y1="6"  x2="18" y2="18"/>
                        </svg>
                    </button>

                    <div class="modal-overlay">
                        <div class="modal-box">
                            <div class="modal-tabs">
                                <button class="btn-tab-folder" data-i18n="home.modal_create_folder">Create folder</button>
                                <button class="btn-tab-project" data-i18n="home.modal_create_project">Create project</button>
                            </div>
                            <div class="folder-form">
                                <form class="input-group">
                                    <input type="text"
                                           data-i18n-placeholder="home.modal_folder_name_placeholder"
                                           placeholder="Name folder" class="modal-input">
                                </form>
                            </div>
                            <div class="project-form">
                                <form class="input-group">
                                    <input type="text"
                                           data-i18n-placeholder="home.modal_project_name_placeholder"
                                           placeholder="Name project" class="modal-input">
                                </form>
                            </div>
                            <div class="color-palette">
                                <button class="color-swatch" style="background-color: #a0aec0;"></button>
                                <button class="color-swatch" style="background-color: #818cf8;"></button>
                                <button class="color-swatch" style="background-color: #4fd1ed;"></button>
                                <button class="color-swatch" style="background-color: #f6ad55;"></button>
                                <button class="color-swatch" style="background-color: #b83280;"></button>
                                <button class="color-swatch" style="background-color: #f687b3;"></button>
                                <button class="color-swatch" style="background-color: #faf089;"></button>
                                <button class="color-swatch" style="background-color: #9ae6b4;"></button>
                                <button class="color-swatch" style="background-color: #fc8181;"></button>
                                <button class="color-swatch" style="background-color: #a78bfa;"></button>
                                <button class="color-swatch" style="background-color: #22d3ee;"></button>
                                <button class="color-swatch" style="background-color: #6ee7b7;"></button>
                                <button class="color-swatch" style="background-color: #8b5cf6;"></button>
                                <button class="color-swatch" style="background-color: #3b82f6;"></button>
                                <button class="color-swatch" style="background-color: #ec4899;"></button>
                                <button class="color-swatch" style="background-color: #f87171;"></button>
                                <button class="color-swatch" style="background-color: #94a3b8;"></button>
                                <button class="color-swatch" style="background-color: #b7948c;"></button>
                                <button class="color-swatch" style="background-color: #5eead4;"></button>
                                <button class="color-swatch" style="background-color: #4a5568;"></button>
                            </div>
                            <div class="confirm-box">
                                <p class="btn-cancel" data-i18n="home.btn_cancel">Cancel</p>
                                <p class="btn-accept" data-i18n="home.btn_accept">Accept</p>
                            </div>
                        </div>
                        <div class="modal-more-box">
                            <div class="form">
                                <form class="input-group">
                                    <input type="text"
                                           data-i18n-placeholder="home.modal_new_name_placeholder"
                                           placeholder="New name" class="modal-input">
                                </form>
                            </div>
                            <div class="color-palette">
                                <button class="color-swatch" style="background-color: #a0aec0;"></button>
                                <button class="color-swatch" style="background-color: #818cf8;"></button>
                                <button class="color-swatch" style="background-color: #4fd1ed;"></button>
                                <button class="color-swatch" style="background-color: #f6ad55;"></button>
                                <button class="color-swatch" style="background-color: #b83280;"></button>
                                <button class="color-swatch" style="background-color: #f687b3;"></button>
                                <button class="color-swatch" style="background-color: #faf089;"></button>
                                <button class="color-swatch" style="background-color: #9ae6b4;"></button>
                                <button class="color-swatch" style="background-color: #fc8181;"></button>
                                <button class="color-swatch" style="background-color: #a78bfa;"></button>
                                <button class="color-swatch" style="background-color: #22d3ee;"></button>
                                <button class="color-swatch" style="background-color: #6ee7b7;"></button>
                                <button class="color-swatch" style="background-color: #8b5cf6;"></button>
                                <button class="color-swatch" style="background-color: #3b82f6;"></button>
                                <button class="color-swatch" style="background-color: #ec4899;"></button>
                                <button class="color-swatch" style="background-color: #f87171;"></button>
                                <button class="color-swatch" style="background-color: #94a3b8;"></button>
                                <button class="color-swatch" style="background-color: #b7948c;"></button>
                                <button class="color-swatch" style="background-color: #5eead4;"></button>
                                <button class="color-swatch" style="background-color: #4a5568;"></button>
                            </div>
                            <div class="confirm-box">
                                <p class="btn-cancel" data-i18n="home.btn_cancel">Cancel</p>
                                <p class="btn-delete" data-i18n="home.btn_delete">Delete</p>
                                <p class="btn-accept" data-i18n="home.btn_accept">Accept</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            </div><!-- /.container -->
        </div><!-- /.app-content -->

        <!-- Calendar Overlay for Task Detail -->
        <div class="calendar-overlay" id="taskCalendarOverlay">
            <div class="calendar-popup" id="taskCalendarPopup">
                <div class="calendar-header">
                    <button class="calendar-nav-btn" id="taskPrevMonthBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <div class="calendar-title">
                        <select class="month-select" id="taskMonthSelect">
                            <option value="0"  data-i18n="home.month_1">January</option>
                            <option value="1"  data-i18n="home.month_2">February</option>
                            <option value="2"  data-i18n="home.month_3">March</option>
                            <option value="3"  data-i18n="home.month_4">April</option>
                            <option value="4"  data-i18n="home.month_5">May</option>
                            <option value="5"  data-i18n="home.month_6">June</option>
                            <option value="6"  data-i18n="home.month_7">July</option>
                            <option value="7"  data-i18n="home.month_8">August</option>
                            <option value="8"  data-i18n="home.month_9">September</option>
                            <option value="9"  data-i18n="home.month_10">October</option>
                            <option value="10" data-i18n="home.month_11">November</option>
                            <option value="11" data-i18n="home.month_12">December</option>
                        </select>
                        <div class="year-stepper" id="taskYearStepper">
                            <button class="year-step-btn" id="taskYearDown">-</button>
                            <span class="year-display" id="taskYearDisplay">2026</span>
                            <button class="year-step-btn" id="taskYearUp">+</button>
                        </div>
                    </div>
                    <button class="calendar-nav-btn" id="taskNextMonthBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>
                <div class="calendar-weekdays">
                    <div class="weekday" data-i18n="home.weekday_su">Su</div>
                    <div class="weekday" data-i18n="home.weekday_mo">Mo</div>
                    <div class="weekday" data-i18n="home.weekday_tu">Tu</div>
                    <div class="weekday" data-i18n="home.weekday_we">We</div>
                    <div class="weekday" data-i18n="home.weekday_th">Th</div>
                    <div class="weekday" data-i18n="home.weekday_fr">Fr</div>
                    <div class="weekday" data-i18n="home.weekday_sa">Sa</div>
                </div>
                <div class="calendar-days" id="taskCalendarDays"></div>
                <div class="calendar-footer">
                    <button class="btn-clear" id="taskClearBtn" data-i18n="home.calendar_clear">Clear</button>
                    <button class="btn-today" id="taskTodayBtn" data-i18n="home.calendar_today">Today</button>
                </div>
            </div>
        </div>

        <!-- Sort / Filter overlay -->
        <div class="sf-overlay" id="sf-overlay"></div>

        <!-- SORT BOX -->
        <div class="sf-float-box" id="sf-sort-box">
            <div class="sf-box-header">
                <span class="sf-box-title" data-i18n="home.btn_sort">Sort</span>
                <button class="sf-box-close" id="sf-sort-close">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                        <path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="sf-box-body" id="sf-sort-body"></div>
            <button class="sf-add-condition-btn" id="sf-sort-add">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
                <span data-i18n="home.sf_add_condition">Add a condition</span>
            </button>
            <div class="sf-box-footer">
                <button class="sf-btn-apply" id="sf-sort-apply">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span data-i18n="home.sf_btn_apply">Apply</span>
                </button>
                <button class="sf-btn-cancel" id="sf-sort-cancel" data-i18n="home.sf_btn_cancel">Cancel</button>
            </div>
        </div>

        <!-- FILTER BOX -->
        <div class="sf-float-box" id="sf-filter-box">
            <div class="sf-box-header">
                <span class="sf-box-title" data-i18n="home.btn_filter">Filter</span>
                <button class="sf-box-close" id="sf-filter-close">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                        <path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="sf-box-body" id="sf-filter-body-wrap">
                <div class="sf-match-row">
                    <span data-i18n="home.filter_label_match">Match</span>
                    <div class="sf-match-toggle">
                        <button class="sf-match-opt active" id="sf-logic-and">AND</button>
                        <button class="sf-match-opt" id="sf-logic-or">OR</button>
                    </div>
                    <span data-i18n="home.filter_label_all_conditions">all conditions</span>
                </div>
                <div id="sf-filter-conditions-list"></div>
            </div>
            <button class="sf-add-condition-btn" id="sf-filter-add">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
                <span data-i18n="home.sf_add_condition">Add a condition</span>
            </button>
            <div class="sf-box-footer">
                <button class="sf-btn-apply" id="sf-filter-apply">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span data-i18n="home.sf_btn_apply">Apply</span>
                </button>
                <button class="sf-btn-cancel" id="sf-filter-cancel" data-i18n="home.sf_btn_cancel">Cancel</button>
            </div>
        </div>
    </body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Sidebar collapse</title>
  <link rel="stylesheet" href="../../shared/reset.css">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <style>
    :root {
      --w-expanded:  220px;
      --w-collapsed:  60px;
    }
    body {
      width: 320px;
      height: 360px;
      background: transparent;
      font-family: var(--font-sans);
      color: var(--text-primary);
      display: flex;
      gap: 4px;
      position: relative;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: linear-gradient(180deg, #1a1a20 0%, #0f0f13 100%);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: var(--sp-3);
      gap: var(--sp-2);
      overflow: hidden;
      flex-shrink: 0;
      animation: sidebarToggle 4s var(--t-slow) infinite, float 3s ease-in-out infinite;
      box-shadow: 4px 0 24px rgba(0,0,0,0.5), inset -1px 0 0 var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .item {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-2) var(--sp-3);
      border-radius: var(--radius-sm);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .item.active {
      background: var(--accent-subtle);
    }
    .icon {
      width: 20px;
      height: 20px;
      border-radius: var(--radius-xs);
      flex-shrink: 0;
      opacity: 0.7;
    }
    .item.active .icon { opacity: 1; }

    .label {
      font-size: 13px;
      animation: labelFade 4s var(--t-slow) infinite;
    }
    .item.active .label { color: var(--accent-primary); font-weight: 500; }

    /* ── Content area ── */
    .content {
      flex: 1;
      padding: var(--sp-4);
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
      background: var(--bg-base);
      box-shadow: -4px 0 16px rgba(0,0,0,0.3);
      border-radius: var(--radius-md);
      overflow: hidden;
      animation: float 3s ease-in-out infinite;
    }

    /* ── Notif dot ── */
    .item-wrap {
      position: relative;
    }
    .notif-dot {
      position: absolute;
      top: 4px;
      right: 6px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 6px rgba(239,68,68,0.7);
      pointer-events: none;
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.8); }
    }
    .content-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .content-line {
      height: 8px;
      border-radius: var(--radius-xs);
      background: var(--bg-elevated);
    }
    .content-line.short { width: 60%; }
    .content-line.medium { width: 80%; }

    /* ── Animations ── */
    @keyframes sidebarToggle {
      0%, 35%  { width: var(--w-expanded); }
      50%, 85% { width: var(--w-collapsed); }
      100%     { width: var(--w-expanded); }
    }
    @keyframes labelFade {
      0%, 35%  { opacity: 1; }
      50%, 85% { opacity: 0; }
      100%     { opacity: 1; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="item active">
      <svg class="icon" viewBox="0 0 20 20" fill="none">
        <rect x="3" y="3" width="6" height="6" rx="1.5" fill="#6366f1"/>
        <rect x="11" y="3" width="6" height="6" rx="1.5" fill="#6366f1" opacity=".5"/>
        <rect x="3" y="11" width="6" height="6" rx="1.5" fill="#6366f1" opacity=".5"/>
        <rect x="11" y="11" width="6" height="6" rx="1.5" fill="#6366f1" opacity=".5"/>
      </svg>
      <span class="label">Trang chủ</span>
    </div>
    <div class="item">
      <svg class="icon" viewBox="0 0 20 20" fill="none">
        <rect x="3" y="5" width="14" height="2" rx="1" fill="#9494a0"/>
        <rect x="3" y="9" width="10" height="2" rx="1" fill="#9494a0"/>
        <rect x="3" y="13" width="12" height="2" rx="1" fill="#9494a0"/>
      </svg>
      <span class="label">Nhiệm vụ</span>
    </div>
    <div class="item">
      <svg class="icon" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="6" stroke="#9494a0" stroke-width="2"/>
        <path d="M10 7v3l2 2" stroke="#9494a0" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="label">Pomodoro</span>
    </div>
    <div class="item-wrap">
      <div class="item">
        <svg class="icon" viewBox="0 0 20 20" fill="none">
          <path d="M3 14l4-4 3 3 4-5 3 3" stroke="#9494a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="label">Thống kê</span>
      </div>
      <span class="notif-dot"></span>
    </div>
    <div class="item">
      <svg class="icon" viewBox="0 0 20 20" fill="none">
        <path d="M4 4h12v9a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" stroke="#9494a0" stroke-width="1.5"/>
        <path d="M8 17h4" stroke="#9494a0" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="label">Chatbot</span>
    </div>
  </aside>

  <main class="content">
    <div class="content-title">Nhiệm vụ hôm nay</div>
    <div class="content-line medium"></div>
    <div class="content-line short"></div>
    <div class="content-line medium"></div>
    <div class="content-line" style="width:70%"></div>
  </main>
</body>
</html>

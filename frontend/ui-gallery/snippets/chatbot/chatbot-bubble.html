<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chat bubble</title>
  <link rel="stylesheet" href="../../shared/reset.css">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <style>
    body {
      width: 300px;
      height: 360px;
      background: transparent;
      font-family: var(--font-sans);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      padding: 14px;
      box-sizing: border-box;
      position: relative;
      transform: perspective(800px) rotateX(3deg) rotateY(-4deg);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-3px); }
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ── Glow pool (cyan) ── */
    .glow-pool {
      position: absolute;
      width: 55%;
      height: 50%;
      left: 20%;
      top: 28%;
      background: radial-gradient(ellipse at 50% 50%, rgba(6,182,212,0.22) 0%, transparent 70%);
      filter: blur(26px);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Scene container ── */
    #scene {
      display: flex;
      flex-direction: column;
      flex: 1;
      position: relative;
      z-index: 1;
    }

    /* ── Float-AI badge — absolute top-right of scene ── */
    .float-ai {
      position: absolute;
      top: 6px;
      right: 0;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 3px 9px;
      border-radius: var(--radius-sm);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 10px rgba(6,182,212,0.35);
      z-index: 3;
      opacity: 0;
      animation: float 3s ease-in-out infinite 0s, fadeIn 0.25s ease forwards 0.15s;
    }

    /* ── Box header — lệch trái, float 0s ── */
    .box-header {
      width: 82%;
      align-self: flex-start;
      margin-left: 4px;
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      padding: 10px 14px;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
      margin-bottom: -14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4), 0 0 16px rgba(6,182,212,0.14);
      animation: float 3s ease-in-out infinite 0s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-icon {
      width: 26px;
      height: 26px;
      background: var(--accent-primary);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-title {
      font-size: 13px;
      font-weight: 600;
      flex: 1;
    }
    .header-trash { color: var(--text-tertiary); }

    /* ── Messages area (no box — bubbles float freely) ── */
    .messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 20px 12px 10px;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
      opacity: 0;
    }
    .msg-group.user  { align-items: flex-end; }
    .msg-group.ai    { align-items: flex-start; }

    .sender-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-tertiary);
      text-transform: uppercase;
      padding: 0 2px;
    }

    .bubble {
      max-width: 200px;
      padding: 8px 11px;
      border-radius: var(--radius-lg);
      font-size: 12px;
      line-height: 1.5;
    }
    .msg-group.user .bubble {
      background: var(--accent-primary);
      color: #fff;
      border-bottom-right-radius: var(--radius-xs);
      box-shadow: 0 4px 12px rgba(99,102,241,0.35);
    }
    .msg-group.ai .bubble {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-bottom-left-radius: var(--radius-xs);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    /* artifact card */
    .artifact {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 11px;
      margin-top: 3px;
      max-width: 200px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .artifact-icon {
      width: 20px;
      height: 20px;
      background: rgba(245,158,11,0.15);
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #f59e0b;
    }
    .artifact-name {
      flex: 1;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .artifact-save {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent-primary);
      background: var(--accent-subtle);
      border-radius: var(--radius-xs);
      padding: 2px 6px;
      flex-shrink: 0;
    }

    /* typing */
    .typing-row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
      opacity: 0;
    }
    .typing-dots {
      display: flex;
      gap: 3px;
      align-items: center;
      padding: 9px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      border-bottom-left-radius: var(--radius-xs);
    }
    .typing-dots span {
      display: block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: dotBounce 0.9s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.30s; }
    @keyframes dotBounce {
      0%,80%,100% { transform: translateY(0);   opacity: .4; }
      40%          { transform: translateY(-4px); opacity: 1; }
    }

    /* ── Box composer — lệch phải, float 1.5s ── */
    .box-composer {
      width: 82%;
      align-self: flex-end;
      margin-right: 4px;
      background: var(--bg-elevated);
      border-radius: var(--radius-lg);
      padding: 8px 10px;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
      margin-top: -14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
      animation: float 3s ease-in-out infinite 1.5s;
    }
    .input-row {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 6px 8px;
    }
    .input-placeholder {
      flex: 1;
      font-size: 11px;
      color: var(--text-tertiary);
    }
    .send-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .input-hint {
      font-size: 9px;
      color: var(--text-tertiary);
      text-align: center;
      padding: 3px 0 0;
    }

    /* ── Slide animations for bubbles ── */
    @keyframes slideRight {
      from { transform: translateX(20px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes slideLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }
    .anim-right { animation: slideRight 0.28s var(--t-spring) forwards; }
    .anim-left  { animation: slideLeft  0.28s var(--t-spring) forwards; }
  </style>
</head>
<body>

  <div class="glow-pool"></div>

  <div id="scene">

    <!-- Float AI badge -->
    <div class="float-ai">✦ AI</div>

    <!-- Box header -->
    <div class="box-header">
      <div class="header-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 3h10v6a1 1 0 01-1 1H3a1 1 0 01-1-1V3z" stroke="white" stroke-width="1.2"/>
          <path d="M5 12h4" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="header-title">Trợ lý AI</div>
      <div class="header-trash">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2 3.5h9M5 3.5V2.5h3v1M5.5 5.5v4M7.5 5.5v4M3 3.5l.6 7h5.8l.6-7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- Messages (no box — float freely) -->
    <div class="messages" id="messages"></div>

    <!-- Box composer -->
    <div class="box-composer">
      <div class="input-row">
        <div class="input-placeholder">Hỏi bất cứ điều gì…</div>
        <div class="send-btn">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M1 9L9 5 1 1v3.5l6 .5-6 .5V9z" fill="white"/>
          </svg>
        </div>
      </div>
      <div class="input-hint">Enter để gửi · Shift+Enter để xuống dòng</div>
    </div>

  </div>

  <script>
  (function () {
    const container = document.getElementById('messages');
    const scene     = document.getElementById('scene');
    let timers = [];

    function clear() {
      timers.forEach(clearTimeout);
      timers = [];
      container.innerHTML = '';
    }

    function later(fn, ms) {
      const t = setTimeout(fn, ms);
      timers.push(t);
    }

    function addUser(text) {
      const g = document.createElement('div');
      g.className = 'msg-group user anim-right';
      g.innerHTML = `<div class="sender-label">Bạn</div><div class="bubble">${text}</div>`;
      container.appendChild(g);
      void g.offsetWidth;
      g.style.opacity = '1';
    }

    function addTyping() {
      const g = document.createElement('div');
      g.className = 'typing-row';
      g.innerHTML = `<div class="sender-label">AI</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
      container.appendChild(g);
      void g.offsetWidth;
      g.classList.add('anim-left');
      g.style.opacity = '1';
      return g;
    }

    function addAI(text, artifact) {
      const g = document.createElement('div');
      g.className = 'msg-group ai anim-left';
      let inner = `<div class="sender-label">AI</div><div class="bubble">${text}</div>`;
      if (artifact) {
        inner += `
          <div class="artifact">
            <div class="artifact-icon">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M1 3.5A1 1 0 012 2.5h3.5L7 4h3a1 1 0 011 1v5a1 1 0 01-1 1H2a1 1 0 01-1-1V3.5z" fill="currentColor" opacity=".8"/>
              </svg>
            </div>
            <div class="artifact-name">${artifact}</div>
            <div class="artifact-save">Lưu</div>
          </div>`;
      }
      g.innerHTML = inner;
      container.appendChild(g);
      void g.offsetWidth;
      g.style.opacity = '1';
    }

    function run() {
      clear();
      scene.style.opacity = '1';

      later(() => addUser('Tạo folder tree cho dự án web'), 400);

      let typingEl;
      later(() => { typingEl = addTyping(); }, 900);

      later(() => {
        if (typingEl) typingEl.remove();
        addAI('Đây là cấu trúc thư mục đề xuất cho dự án web của bạn.', 'Folder tree – Dự án Web');
      }, 2200);

      later(() => {
        addAI('Bạn có muốn điều chỉnh không?');
      }, 3200);

      later(() => {
        scene.style.transition = 'opacity 0.4s ease';
        scene.style.opacity = '0';
        later(() => {
          scene.style.transition = '';
          run();
        }, 450);
      }, 5200);
    }

    run();
  })();
  </script>
</body>
</html>

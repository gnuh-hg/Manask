<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Folder tree</title>
  <link rel="stylesheet" href="../../shared/reset.css">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <style>
    body {
      width: 240px;
      height: 340px;
      background: transparent;
      font-family: var(--font-sans);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 14px;
      box-sizing: border-box;
      position: relative;
      transform: perspective(800px) rotateX(2deg) rotateY(-3deg);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }

    /* ── Glow pool ── */
    .glow-pool {
      position: absolute;
      width: 60%;
      height: 50%;
      left: 18%;
      top: 25%;
      background: radial-gradient(ellipse at 50% 50%, rgba(99,102,241,0.2) 0%, transparent 70%);
      filter: blur(26px);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Chip "Tất cả" — lệch trái ── */
    .chip-all {
      align-self: flex-start;
      margin-left: 2px;
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
      z-index: 2;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
      animation: float 3s ease-in-out infinite 0s;
    }
    .chip-all .folder-ico svg { width: 14px; height: 14px; }
    .chip-all .lbl {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* ── Box folder ── */
    .box-folder {
      width: 100%;
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      padding: 4px 6px;
      position: relative;
      z-index: 1;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      box-sizing: border-box;
      overflow: hidden;
    }
    .box-folder:nth-child(2) { animation: float 3s ease-in-out infinite 0.4s; }
    .box-folder:nth-child(3) { animation: float 3s ease-in-out infinite 0.8s; }
    .box-folder:nth-child(4) { animation: float 3s ease-in-out infinite 1.2s; }

    /* ── Folder row ── */
    .folder-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 6px;
      border-radius: var(--radius-sm);
      cursor: default;
    }

    .chevron {
      width: 12px; height: 12px;
      flex-shrink: 0;
      color: var(--text-tertiary);
      transition: transform 0.28s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .chevron svg { width: 12px; height: 12px; }

    .folder-ico {
      width: 16px; height: 16px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .folder-ico svg { width: 16px; height: 16px; }

    .folder-label {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Children ── */
    .children {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.32s ease;
    }
    .children.open { max-height: 200px; }

    .project-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px 4px 26px;
      border-radius: var(--radius-sm);
      border-left: 2px solid transparent;
      font-size: 11.5px;
      color: var(--text-secondary);
      cursor: default;
      transition: background 0.15s, border-color 0.15s;
    }
    .project-item.active {
      background: var(--accent-subtle);
      border-left-color: var(--accent-primary);
      color: var(--text-primary);
    }

    .proj-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Badge "Tạo mới" — lệch phải ── */
    .badge-create {
      align-self: flex-end;
      margin-right: 2px;
      background: var(--accent-primary);
      color: #fff;
      font-size: 11.5px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      gap: 5px;
      position: relative;
      z-index: 2;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 12px rgba(99,102,241,0.3);
      animation: float 3s ease-in-out infinite 1.6s;
    }
  </style>
</head>
<body>

  <div class="glow-pool"></div>

  <!-- Chip Tất cả -->
  <div class="chip-all">
    <div class="folder-ico">
      <svg viewBox="0 0 16 16" fill="none">
        <path d="M1.5 4.5A1.5 1.5 0 013 3h3.379a1.5 1.5 0 011.06.44l.622.621H13A1.5 1.5 0 0114.5 5.5v7A1.5 1.5 0 0113 14H3a1.5 1.5 0 01-1.5-1.5v-8z" fill="#9494a0"/>
      </svg>
    </div>
    <span class="lbl">Tất cả</span>
  </div>

  <!-- Box folder: Công việc -->
  <div class="box-folder">
    <div class="folder-row">
      <div class="chevron" id="chevronWork">
        <svg viewBox="0 0 12 12" fill="none">
          <path d="M4 2.5l4 3.5-4 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="folder-ico">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M1.5 4.5A1.5 1.5 0 013 3h3.379a1.5 1.5 0 011.06.44l.622.621H13A1.5 1.5 0 0114.5 5.5v7A1.5 1.5 0 0113 14H3a1.5 1.5 0 01-1.5-1.5v-8z" fill="#818cf8"/>
        </svg>
      </div>
      <span class="folder-label">Công việc</span>
    </div>
    <div class="children" id="childrenWork">
      <div class="project-item">
        <div class="proj-dot" style="background:#f59e0b"></div>Sprint Q2
      </div>
      <div class="project-item" id="projWebsite">
        <div class="proj-dot" style="background:#22d3ee"></div>Website mới
      </div>
      <div class="project-item">
        <div class="proj-dot" style="background:#4ade80"></div>API v3
      </div>
    </div>
  </div>

  <!-- Box folder: Cá nhân -->
  <div class="box-folder">
    <div class="folder-row">
      <div class="chevron" id="chevronPersonal">
        <svg viewBox="0 0 12 12" fill="none">
          <path d="M4 2.5l4 3.5-4 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="folder-ico">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M1.5 4.5A1.5 1.5 0 013 3h3.379a1.5 1.5 0 011.06.44l.622.621H13A1.5 1.5 0 0114.5 5.5v7A1.5 1.5 0 0113 14H3a1.5 1.5 0 01-1.5-1.5v-8z" fill="#f59e0b"/>
        </svg>
      </div>
      <span class="folder-label">Cá nhân</span>
    </div>
    <div class="children" id="childrenPersonal">
      <div class="project-item">
        <div class="proj-dot" style="background:#60a5fa"></div>Học tiếng Anh
      </div>
      <div class="project-item">
        <div class="proj-dot" style="background:#f472b6"></div>Gym schedule
      </div>
    </div>
  </div>

  <!-- Box folder: Lưu trữ -->
  <div class="box-folder">
    <div class="folder-row">
      <div class="chevron">
        <svg viewBox="0 0 12 12" fill="none">
          <path d="M4 2.5l4 3.5-4 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="folder-ico">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M1.5 4.5A1.5 1.5 0 013 3h3.379a1.5 1.5 0 011.06.44l.622.621H13A1.5 1.5 0 0114.5 5.5v7A1.5 1.5 0 0113 14H3a1.5 1.5 0 01-1.5-1.5v-8z" fill="#9494a0"/>
        </svg>
      </div>
      <span class="folder-label">Lưu trữ</span>
    </div>
  </div>

  <!-- Badge Tạo mới -->
  <div class="badge-create">
    <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
      <path d="M7 2v10M2 7h10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    Tạo mới
  </div>

  <script>
  (function () {
    const childrenWork     = document.getElementById('childrenWork');
    const childrenPersonal = document.getElementById('childrenPersonal');
    const chevronWork      = document.getElementById('chevronWork');
    const chevronPersonal  = document.getElementById('chevronPersonal');
    const projWebsite      = document.getElementById('projWebsite');

    function resetAll() {
      childrenWork.classList.remove('open');
      childrenPersonal.classList.remove('open');
      chevronWork.style.transform = '';
      chevronPersonal.style.transform = '';
      projWebsite.classList.remove('active');
    }

    function runCycle() {
      resetAll();

      setTimeout(() => {
        childrenWork.classList.add('open');
        chevronWork.style.transform = 'rotate(90deg)';
      }, 600);

      setTimeout(() => {
        childrenPersonal.classList.add('open');
        chevronPersonal.style.transform = 'rotate(90deg)';
      }, 2100);

      setTimeout(() => {
        projWebsite.classList.add('active');
      }, 3600);

      setTimeout(() => {
        resetAll();
        setTimeout(runCycle, 600);
      }, 5400);
    }

    runCycle();
  })();
  </script>
</body>
</html>

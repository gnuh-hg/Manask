<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Heatmap hoạt động</title>
  <link rel="stylesheet" href="../../shared/reset.css">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <style>
    body {
      width: 400px;
      height: 160px;
      background: transparent;
      display: flex;
      flex-direction: column;
      padding: 10px 14px;
      box-sizing: border-box;
      font-family: var(--font-sans);
      position: relative;
      transform: perspective(1000px) rotateX(2deg) rotateY(-2deg);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }

    /* ── Dual glow pools ── */
    .glow-amber, .glow-indigo {
      position: absolute;
      width: 35%;
      height: 65%;
      top: 22%;
      filter: blur(26px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-amber  {
      left: 5%;
      background: radial-gradient(ellipse at 50% 50%, rgba(245,158,11,0.2) 0%, transparent 70%);
    }
    .glow-indigo {
      right: 5%;
      background: radial-gradient(ellipse at 50% 50%, rgba(99,102,241,0.18) 0%, transparent 70%);
    }

    /* ── Chip header — lệch phải, sync float ── */
    .chip-header {
      align-self: flex-end;
      margin-right: 4px;
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
      margin-bottom: -10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
      animation: float 3s ease-in-out infinite 0s;
    }
    .chip-header .title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Streak badge — overlap top-left của box-heatmap ── */
    .streak-badge {
      position: absolute;
      top: 28px;
      left: 18px;
      background: var(--bg-elevated);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: var(--radius-md);
      padding: 3px 8px;
      font-size: 10.5px;
      font-weight: 600;
      color: #f59e0b;
      display: flex;
      align-items: center;
      gap: 4px;
      z-index: 3;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 8px rgba(245,158,11,0.2);
      animation: float 3s ease-in-out infinite 0.8s;
    }

    /* ── Box heatmap — sync float ── */
    .box-heatmap {
      flex: 1;
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      padding: 8px 10px 6px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 28px rgba(0,0,0,0.5), 0 0 18px rgba(99,102,241,0.14);
      box-sizing: border-box;
      overflow: hidden;
      animation: float 3s ease-in-out infinite 0s;
    }

    .heatmap-container {
      display: flex;
      gap: 5px;
      align-items: flex-start;
      flex: 1;
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    .heatmap-container.hidden { opacity: 0; }

    /* Day labels */
    .day-labels {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 13px;
    }
    .day-label {
      font-size: 8.5px;
      color: var(--text-tertiary);
      height: 11px;
      line-height: 11px;
      width: 13px;
      text-align: right;
    }

    /* Grid */
    .grid-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .month-labels {
      display: flex;
      gap: 2px;
      height: 11px;
      align-items: center;
    }

    .grid-rows {
      display: flex;
      gap: 2px;
    }

    .grid-col {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .cell {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.12s ease;
    }

    /* Legend */
    .legend {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-top: 4px;
      font-size: 8.5px;
      color: var(--text-tertiary);
      align-self: flex-end;
    }
    .legend-cell {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <div class="glow-amber"></div>
  <div class="glow-indigo"></div>

  <!-- Streak badge -->
  <div class="streak-badge">🔥 12 ngày</div>

  <!-- Chip header -->
  <div class="chip-header">
    <span class="title">Hoạt động</span>
  </div>

  <!-- Box heatmap -->
  <div class="box-heatmap">
    <div class="heatmap-container" id="heatmapContainer">
      <div class="day-labels">
        <div class="day-label">T2</div>
        <div class="day-label"></div>
        <div class="day-label">T4</div>
        <div class="day-label"></div>
        <div class="day-label">T6</div>
        <div class="day-label"></div>
        <div class="day-label">CN</div>
      </div>
      <div class="grid-wrap">
        <div class="month-labels" id="monthLabels"></div>
        <div class="grid-rows" id="gridRows"></div>
      </div>
    </div>
    <div class="legend">
      <span>Ít</span>
      <div class="legend-cell" style="background:var(--bg-elevated);border:1px solid var(--border-subtle)"></div>
      <div class="legend-cell" style="background:rgba(99,102,241,0.25)"></div>
      <div class="legend-cell" style="background:rgba(99,102,241,0.55)"></div>
      <div class="legend-cell" style="background:var(--accent-primary)"></div>
      <span>Nhiều</span>
    </div>
  </div>

  <script>
  (function () {
    const COLS = 26, ROWS = 7;
    const CELL_COLORS = [
      'var(--bg-elevated)',
      'rgba(99,102,241,0.25)',
      'rgba(99,102,241,0.55)',
      'var(--accent-primary)'
    ];
    const MONTHS = ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'];

    function seededRng(seed) {
      return function () {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function generateData(seed) {
      const rng = seededRng(seed);
      return Array.from({ length: COLS }, () =>
        Array.from({ length: ROWS }, () => {
          const r = rng();
          if (r < 0.25) return 0;
          if (r < 0.55) return 1;
          if (r < 0.80) return 2;
          return 3;
        })
      );
    }

    function buildMonthLabels(startMonth) {
      const container = document.getElementById('monthLabels');
      container.innerHTML = '';
      for (let c = 0; c < COLS; c++) {
        const span = document.createElement('span');
        span.style.cssText = 'width:12px;min-width:12px;font-size:8.5px;color:var(--text-tertiary);overflow:hidden';
        if (c % 4 === 0) span.textContent = MONTHS[(startMonth + Math.floor(c / 4)) % 12];
        container.appendChild(span);
      }
    }

    const allCells = [];

    function buildGrid() {
      const gridRows = document.getElementById('gridRows');
      gridRows.innerHTML = '';
      allCells.length = 0;
      for (let c = 0; c < COLS; c++) {
        const col = document.createElement('div');
        col.className = 'grid-col';
        const colCells = [];
        for (let r = 0; r < ROWS; r++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          col.appendChild(cell);
          colCells.push(cell);
        }
        gridRows.appendChild(col);
        allCells.push(colCells);
      }
    }

    function showCells(data) {
      return new Promise(resolve => {
        for (let c = 0; c < COLS; c++) {
          const delay = c * 38;
          for (let r = 0; r < ROWS; r++) {
            const cell = allCells[c][r];
            cell.style.background = CELL_COLORS[data[c][r]];
            setTimeout(() => { cell.style.opacity = 1; }, delay + r * 5);
          }
          if (c === COLS - 1) setTimeout(resolve, delay + ROWS * 5 + 150);
        }
      });
    }

    function hideCells() {
      allCells.forEach(col => col.forEach(cell => { cell.style.opacity = 0; }));
    }

    buildGrid();
    buildMonthLabels(2);

    let seed = 0xABCD1234;

    async function runLoop() {
      const container = document.getElementById('heatmapContainer');
      while (true) {
        container.classList.remove('hidden');
        hideCells();
        await showCells(generateData(seed));
        await new Promise(r => setTimeout(r, 1200));
        container.classList.add('hidden');
        await new Promise(r => setTimeout(r, 600));
        seed = (seed ^ 0xDEADBEEF) >>> 0;
        buildMonthLabels(Math.floor(Math.random() * 12));
      }
    }

    setTimeout(runLoop, 300);
  })();
  </script>
</body>
</html>
